version: 2
updates:
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "chore"
    labels:
      - "dependencies"
    groups:
      patch-and-minor:
        update-types:
          - "minor"
          - "patch"
      major:
        update-types:
          - "major"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"
    labels:
      - "ci"
    groups:
      # OpenSSF Scorecard hardening: separate security patches so they
      # bypass the weekly batching window and land as their own PRs.
      # `applies-to: security-updates` is the GH-recognized opt-in.
      security:
        applies-to: security-updates
        patterns:
          - "*"