name: Release

# Triggers on a `v*.*.*` tag push (auto) or manual dispatch (retry).
# Builds the wheel + sdist and attaches them to a GitHub Release.
#
# PyPI publish removed in v0.2.1 of this workflow — see commit message.
# To re-enable PyPI, add back the `publish` job (block copied from the
# v0.2 history at commit 7eac6d6 and earlier) and re-add
# `id-token: write` under permissions. The trusted-publisher + project
# reservation on the PyPI side is the user's setup work, not CI's.
#
# Does NOT bump the version — that's done by the human at PR merge
# time (see CLAUDE.md "Never run destructive git commands without asking first").

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9 # v7
        with:
          python-version: "3.11"

      - name: Build
        run: uv build

      - name: Upload artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: dist
          path: dist/

  github-release:
    name: GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: dist
          path: dist/

      - uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: dist/*
          generate_release_notes: true
