name: Release

# Triggers on a `v*.*.*` tag push. Builds the wheel + sdist, publishes to
# PyPI via OIDC trusted publishing, and attaches artifacts to a GitHub
# Release. Does NOT bump the version — that's done by the human at PR
# merge time (see CLAUDE.md "Never run destructive git commands without
# asking first").

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write  # PyPI OIDC trusted publishing

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.11"

      - name: Build
        run: uv build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/agentsla
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    name: GitHub Release
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true