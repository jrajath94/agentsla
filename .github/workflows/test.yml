name: CI

on:
  push:
    branches: [main, "phase-*"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  audit:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --extra all

      - name: Ruff check
        run: uv run ruff check .

      - name: Ruff format
        run: uv run ruff format --check .

      - name: Type check (mypy strict)
        run: uv run mypy agentsla/core agentsla/policy agentsla/verify

  test:
    name: Test & Coverage
    runs-on: ubuntu-latest
    needs: audit
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --extra all

      - name: Run tests with coverage gate (>=85%)
        run: uv run pytest tests/ -v --cov=agentsla/core --cov=agentsla/policy --cov=agentsla/verify --cov-fail-under=85 --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  conventional-commits:
    name: Conventional Commits
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate commit subjects
        env:
          PATTERN: '^(feat|fix|perf|test|docs|refactor|bench|ci)(\(.+\))?!?: .{1,72}$'
        run: |
          set -euo pipefail
          bad=0
          while IFS= read -r sha; do
            subject=$(git log -1 --format='%s' "$sha")
            if ! printf '%s\n' "$subject" | grep -qE "$PATTERN"; then
              printf '::error file=commit,title=invalid-subject::sha=%s subject=%s\n' "$sha" "$subject"
              bad=1
            fi
          done < <(git rev-list origin/main..HEAD --no-merges)
          if [ "$bad" -ne 0 ]; then
            printf '::error::one or more commit subjects violate Conventional Commits\n'
            exit 1
          fi
          printf 'all commit subjects OK\n'
