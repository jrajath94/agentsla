name: test

on:
  push:
    branches: [main, "phase-*"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
      - name: Install
        run: uv sync --extra all
      - name: Lint (ruff)
        run: |
          uv run ruff check .
          uv run ruff format --check .
      - name: Type (mypy)
        run: uv run mypy agentsla/core
      - name: Test (coverage gate)
        run: uv run pytest --cov=agentsla/core --cov-fail-under=85
