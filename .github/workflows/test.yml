name: CI

on:
  push:
    branches: [main, "phase-*"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  audit:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9 # v7
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --extra all --group dev

      - name: Ruff check
        run: uv run ruff check .

      - name: Ruff format
        run: uv run ruff format --check .

      - name: Type check (mypy strict)
        run: uv run mypy agentsla/core agentsla/policy agentsla/verify

  test:
    name: Test & Coverage
    runs-on: ubuntu-latest
    needs: audit
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9 # v7
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --extra all --group dev

      - name: Run tests with coverage gate (>=85%)
        run: uv run pytest tests/ -v --cov=agentsla/core --cov=agentsla/policy --cov=agentsla/verify --cov-fail-under=85 --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@04b047e8bb82a0c002c8312c1c880fbc6a999d45 # v5
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  conventional-commits:
    name: Conventional Commits
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - name: Validate commit subjects
        env:
          # Conventional Commits permitted types. `chore` + `style` were
          # added in v0.2 after the v0.1 validator (which omitted them)
          # rejected 4 commits in PR #1 — see CHANGELOG § [v0.2.0] CI notes.
          PATTERN: '^(feat|fix|perf|test|docs|refactor|bench|ci|chore|style)(\(.+\))?!?: .{1,72}$'
        run: |
          set -euo pipefail
          bad=0
          while IFS= read -r sha; do
            subject=$(git log -1 --format='%s' "$sha")
            if ! printf '%s\n' "$subject" | grep -qE "$PATTERN"; then
              printf '::error file=commit,title=invalid-subject::sha=%s subject=%s\n' "$sha" "$subject"
              bad=1
            fi
          done < <(git rev-list origin/main..HEAD --no-merges)
          if [ "$bad" -ne 0 ]; then
            printf '::error::one or more commit subjects violate Conventional Commits\n'
            exit 1
          fi
          printf 'all commit subjects OK\n'

  integration:
    name: Integration check (bench + seeded errors)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9 # v7
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --extra all --group dev

      # 1. Bench reproducer: every README headline number must be
      # regenerable from this parquet. Small N (seeds=2) keeps the
      # gate under 30 s while still asserting E2E works.
      - name: Bench reproducer (seeds=2)
        run: |
          uv run python -m agentsla bench --seeds 2 --out bench/results/results.parquet
          test -s bench/results/results.parquet
          echo "parquet bytes: $(wc -c < bench/results/results.parquet)"

      - name: Report from parquet
        run: |
          uv run python -m agentsla report --out bench/results/REPORT.md
          test -s bench/results/REPORT.md
          grep -q "Headline: naked vs wrapped" bench/results/REPORT.md

      # 2. Seeded-error experiment: small N, asserts sensitivity > 0
      # at non-trivial perturbation. Catches any regression that
      # breaks the gate's correctness signal.
      - name: Seeded-error experiment (small N)
        run: |
          uv run python -m agentsla bench-seeded-errors \
            --strategies 0,50 --trials 5 \
            --out bench/results/seeded_errors.parquet \
            --report-section-out bench/results/seeded_errors_section.md
          test -s bench/results/seeded_errors_section.md
          grep -q "Seeded-error experiment" bench/results/seeded_errors_section.md
          # Sensitivity at +/-50% must be > 0 (gate catches at least one).
          awk -F'|' '/±50.0%/ { gsub(/[, %]/, "", $4); if ($4+0 > 0) exit 0; else exit 1 }' \
            bench/results/seeded_errors_section.md
          echo "seeded-error gate passed"

      # 3. Report re-emission: the seeded-error section must append
      # cleanly to REPORT.md when seeded_errors.parquet is present.
      - name: Report includes seeded section
        run: |
          uv run python -m agentsla report --out bench/results/REPORT.md
          grep -q "Seeded-error experiment" bench/results/REPORT.md

      # 3b. Report re-emission: the Real-LLM section must auto-appear in
      # REPORT.md when ``real_llm.parquet`` is present. Closes PRD-v2 §7
      # honest gap #2 by ensuring the measured numbers surface in the
      # public artifact, not just the parquet. Defends against future
      # refactors that drop ``_render_real_llm_section`` from the report
      # pipeline.
      #
      # Conditional: skip the grep when real_llm.parquet is absent (fresh
      # clone without an ANTHROPIC_API_KEY run). The honest-gap banner
      # in REPORT.md already surfaces this state.
      - name: Report includes real-LLM section
        run: |
          uv run python -m agentsla report --out bench/results/REPORT.md
          if [ -s bench/results/real_llm.parquet ]; then
            grep -q "## Real-LLM bench" bench/results/REPORT.md
            echo "real-LLM section present in REPORT.md"
          else
            echo "real_llm.parquet absent (no live API run in this CI); gate skipped"
          fi

      # 4. Integration gate (EXECUTION.md Commit 7): grep-level check
      # that bench/harness.py wires the four components together. Defends
      # against future refactors that silently drop PolicyGate, Classifier,
      # JsonlLabelSink, or build_metrics from the WrappedHooks pipeline.
      - name: Integration gate — bench wiring symbols
        run: |
          set -euo pipefail
          for sym in PolicyGate Classifier JsonlLabelSink build_metrics; do
            if ! grep -q "$sym" agentsla/bench/harness.py; then
              echo "::error file=agentsla/bench/harness.py::missing required symbol $sym"
              exit 1
            fi
          done
          echo "bench wiring symbols OK"

      # 5. Classifier eval provenance gate — defends the PRD-v2 §5
      # invariant #4 ("Honest-gap banners are public") by ensuring the
      # eval report surfaces whether the headline came from synthetic
      # generators or from real Claude API responses. If a refactor
      # silently drops the provenance banner from
      # ``render_eval_section``, this grep fails and the PR cannot land.
      - name: Integration gate — eval-classifier provenance banner
        run: |
          set -euo pipefail
          uv run python -m agentsla.bench.eval_classifier \
            --held-out tests/fixtures/held_out_labels.jsonl \
            --out bench/results/eval_classifier.md
          test -s bench/results/eval_classifier.md
          grep -q "Fixture provenance" bench/results/eval_classifier.md
          echo "eval-classifier provenance banner OK"
